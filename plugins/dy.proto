syntax = "proto3";
package douyin;

// 对应 demo.js 中的 Response
message Response {
  repeated Message messagesList = 1;
  string cursor = 2;
  uint32 fetchInterval = 3;
  uint64 now = 4;
  string internalExt = 5;
  uint32 fetchType = 6;
  uint64 heartbeatDuration = 8;
  bool needAck = 9;
}

// 对应 demo.js 中的 Message
message Message {
  string method = 1;
  bytes payload = 2;
  int64 msgId = 3;
  int32 msgType = 4;
}

// 对应 demo.js 中的 ChatMessage
message ChatMessage {
  Common common = 1;
  User user = 2;
  string content = 3;
  bool visibleToSender = 4;
}

// 对应 demo.js 中的 MemberMessage
// 注意：demo.js 中没有定义 operator 等复杂字段，这里保持一致
message MemberMessage {
  Common common = 1;
  User user = 2;
  uint64 memberCount = 3;
  uint64 action = 10;
}

// 对应 demo.js 中的 GiftMessage
message GiftMessage {
  Common common = 1;
  uint64 giftId = 2;
  uint64 fanTicketCount = 3;
  uint64 groupCount = 4;
  uint64 repeatCount = 5;
  uint64 comboCount = 6;
  User user = 7;
  User toUser = 8;
}

// 对应 demo.js 中的 LikeMessage
message LikeMessage {
  Common common = 1;
  uint64 count = 2;
  uint64 total = 3;
  uint64 color = 4;
  User user = 5;
}

message Common {
  string method = 1;
  uint64 msgId = 2;
  uint64 roomId = 3;
}

message User {
  uint64 id = 1;
  uint64 shortId = 2;
  string nickName = 3;
  uint32 gender = 4;
  Image avatarThumb = 9;
  string displayId = 38;
  string secUid = 46;
}

message Image {
  repeated string urlList = 1;
}